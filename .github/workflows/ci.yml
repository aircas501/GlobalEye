name: Vue + Python + Java CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ==================
      # Python 环境
      # ==================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check Python
        run: python --version

      # ==================
      # Java 环境（11+ 通用）
      # ==================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Check Java
        run: java -version

      # ==================
      # Vue / Node.js 环境（真正修复你报错的地方）
      # ==================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint Vue project
        run: npm run lint -- --no-fix || true

      - name: Build Vue
        run: npm run build || true
