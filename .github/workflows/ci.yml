name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ======================
  # Java (Spring Boot) Build & Test
  # ======================
  java:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: global-eyes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build and test with Maven
        run: mvn clean verify --batch-mode --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results
          path: global-eyes/global_eye_service/target/surefire-reports/

  # ======================
  # Python (qb_analysis_agent) Test
  # ======================
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install qb_analysis_agent dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f qb_analysis_agent/requirements.txt ]; then
            pip install -r qb_analysis_agent/requirements.txt
          fi

      - name: Run Python tests (if any)
        run: |
          if [ -d qb_analysis_agent/tests ]; then
            python -m pytest qb_analysis_agent/tests/ -v
          else
            echo "No tests directory found, skipping"
          fi

  # ======================
  # Node.js (web frontends) Lint & Build check
  # ======================
  node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [qb_SituationSystem_web, LightRAG/lightrag_webui]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: |
          cd ${{ matrix.project }}
          npm install

      - name: Run lint / build check
        run: |
          cd ${{ matrix.project }}
          npm run build --if-present || echo "No build script, skipping"
