name: Full CI Check (Python + Java + Node)

# 只在提交 PR 到 main 时运行
on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ======================
      # Python 3.10 环境 + 测试
      # ======================
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Python tests
        run: |
          python -m pytest tests/ -v || echo "No pytest found, skip"

      # ======================
      # Java JDK 11 环境 + 测试
      # ======================
      - name: Setup Java JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: maven

      - name: Run Java tests
        run: |
          if [ -f mvnw ]; then chmod +x mvnw && ./mvnw test; fi
          if [ -f build.gradle ]; then gradle test; fi

      # ======================
      # Node.js 16+ 环境 + 测试
      # ======================
      - name: Setup Node.js 16
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: "npm"

      - name: Install Node dependencies
        run: |
          if [ -f package.json ]; then npm install; fi

      - name: Run Node tests
        run: |
          if [ -f package.json ]; then npm test || echo "No test script"; fi
